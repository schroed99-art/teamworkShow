; PHP settings for the TeamworkShow backend on FastCGI/FPM shared hosting
; (All-Inkl). Under FastCGI, per-directory php_value in .htaccess is ignored, so
; upload limits live here instead. On the legacy VM (mod_php) this file is simply
; ignored — the Apache php.ini already carries the same values, no harm.
upload_max_filesize = 256M
post_max_size = 260M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
