<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teamwork Show – Server</title>
<style>
  :root {
    --bg: #000; --panel: #111; --panel2: #1a1a1a;
    --magenta: #d81b60; --text: #fff; --dim: #b0b0b0; --line: #2a2a2a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    padding: 24px 28px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: 26px; }
  header h1 .magenta { color: var(--magenta); }
  header .tag {
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--dim); border: 1px solid var(--line); border-radius: 999px; padding: 4px 10px;
  }
  .bar {
    display: flex; gap: 28px; flex-wrap: wrap; align-items: center;
    padding: 16px 28px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  .stat .n { font-size: 22px; font-weight: 700; color: var(--magenta); }
  .stat .l { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; }
  .bar .right { margin-left: auto; font-size: 12px; color: var(--dim); }
  main { padding: 24px 28px 60px; }
  .grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .thumb {
    background: var(--panel2); aspect-ratio: 9 / 16; display: flex;
    align-items: center; justify-content: center; overflow: hidden;
  }
  .thumb img { width: 100%; height: 100%; object-fit: contain; }
  .thumb .video-badge { color: var(--magenta); font-size: 34px; }
  .meta { padding: 10px 12px; }
  .meta .name { font-size: 13px; word-break: break-all; }
  .meta .sub { font-size: 11px; color: var(--dim); margin-top: 4px; display: flex; gap: 8px; }
  .pill { border: 1px solid var(--line); border-radius: 6px; padding: 1px 6px; }
  .empty { color: var(--dim); padding: 40px 0; text-align: center; }
  footer {
    padding: 18px 28px; border-top: 1px solid var(--line); color: var(--dim); font-size: 12px;
  }
  code { background: var(--panel2); padding: 2px 6px; border-radius: 5px; color: #ddd; }
</style>
</head>
<body>
  <header>
    <h1><span class="magenta">Teamwork</span> Show <span style="color:var(--dim)">·</span> Server</h1>
    <span class="tag" id="status">verbinde…</span>
  </header>

  <div class="bar">
    <div class="stat"><div class="n" id="count">–</div><div class="l">Medien</div></div>
    <div class="stat"><div class="n" id="images">–</div><div class="l">Bilder</div></div>
    <div class="stat"><div class="n" id="videos">–</div><div class="l">Videos</div></div>
    <div class="stat"><div class="n" id="size">–</div><div class="l">Gesamtgröße</div></div>
    <div class="right">Aktualisiert: <span id="updated">–</span> · automatisch alle 10 s</div>
  </div>

  <main>
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyMsg" style="display:none">Keine Medien auf dem Server. Dateien per SSH/SFTP in den <code>media/</code>-Ordner legen.</div>
  </main>

  <footer>
    API: <code>GET playlist.php</code> · <code>GET media.php?name=&lt;datei&gt;</code> &nbsp;—&nbsp;
    unterstützt: jpg, jpeg, png, webp, mp4
  </footer>

<script>
const VIDEO_EXT = ["mp4"];
function fmtSize(b) {
  if (b == null || b < 0) return "–";
  if (b < 1024) return b + " B";
  if (b < 1024*1024) return (b/1024).toFixed(0) + " KB";
  return (b/1024/1024).toFixed(1) + " MB";
}
function ext(name) { return (name.split(".").pop() || "").toLowerCase(); }

async function refresh() {
  try {
    const res = await fetch("playlist.php", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const items = data.items || [];
    render(items);
    document.getElementById("status").textContent = "verbunden";
    document.getElementById("status").style.color = "#4caf50";
  } catch (e) {
    document.getElementById("status").textContent = "Server nicht erreichbar";
    document.getElementById("status").style.color = "var(--magenta)";
  }
  document.getElementById("updated").textContent = new Date().toLocaleTimeString();
}

function render(items) {
  const grid = document.getElementById("grid");
  const empty = document.getElementById("emptyMsg");
  grid.innerHTML = "";
  let images = 0, videos = 0, total = 0;
  for (const it of items) {
    const isVideo = VIDEO_EXT.includes(ext(it.name));
    isVideo ? videos++ : images++;
    total += (it.size || 0);
    const card = document.createElement("div");
    card.className = "card";
    const thumb = isVideo
      ? `<div class="thumb"><span class="video-badge">▶</span></div>`
      : `<div class="thumb"><img loading="lazy" src="media.php?name=${encodeURIComponent(it.name)}" alt=""></div>`;
    card.innerHTML = thumb +
      `<div class="meta"><div class="name">${it.name}</div>
       <div class="sub"><span class="pill">${isVideo ? "VIDEO" : "BILD"}</span><span>${fmtSize(it.size)}</span></div></div>`;
    grid.appendChild(card);
  }
  document.getElementById("count").textContent = items.length;
  document.getElementById("images").textContent = images;
  document.getElementById("videos").textContent = videos;
  document.getElementById("size").textContent = fmtSize(total);
  empty.style.display = items.length ? "none" : "block";
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
